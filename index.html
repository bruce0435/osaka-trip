<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>大阪・神戶・京都 八日旅程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sumi: #1a1a18;
  --sumi2: #3d3d38;
  --sumi3: #7a7a72;
  --sumi4: #b8b8ae;
  --sumi5: #e8e8e0;
  --sumi6: #f4f4ee;
  --sumi7: #fafaf6;
  --washi: #f7f5ee;
  --aka: #b5372a;
  --aka2: #d4493a;
  --aka-light: #f8eeec;
  --midori: #2d6b4a;
  --midori-light: #eaf2ec;
  --kon: #2a4a7a;
  --kon-light: #eaeff8;
  --murasaki: #5a3a7a;
  --murasaki-light: #f0eaf8;
  --kin: #8a6a20;
  --kin-light: #f8f0e0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  background:var(--washi);
  color:var(--sumi);
  font-family:'Noto Sans TC',sans-serif;
  font-weight:300;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── 背景紋理 ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,0,0,.018) 28px,rgba(0,0,0,.018) 29px),
    repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(0,0,0,.012) 28px,rgba(0,0,0,.012) 29px);
  pointer-events:none;
  z-index:0;
}

.wrap{max-width:640px;margin:0 auto;position:relative;z-index:1}

/* ── 頁首 ── */
.hdr{
  padding:2rem 1.5rem 1.4rem;
  border-bottom:1px solid var(--sumi5);
  position:relative;
}
.hdr::after{
  content:'';
  position:absolute;
  bottom:-3px;left:1.5rem;right:1.5rem;
  height:1px;
  background:linear-gradient(90deg,var(--aka),transparent 60%);
}
.hdr-en{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--sumi4);font-weight:400;margin-bottom:.5rem;
}
.hdr h1{
  font-family:'Noto Serif TC',serif;
  font-size:20px;font-weight:600;
  color:var(--sumi);line-height:1.4;
  letter-spacing:.04em;
}
.hdr-sub{
  font-size:11px;color:var(--sumi3);margin-top:.35rem;
  letter-spacing:.03em;
}
.hotels{display:flex;gap:6px;flex-wrap:wrap;margin-top:1rem}
.hc{
  font-size:10.5px;padding:3px 10px;border-radius:2px;
  border:1px solid;letter-spacing:.02em;font-weight:400;
}
.hc1{background:var(--kin-light);color:var(--kin);border-color:rgba(138,106,32,.25)}
.hc2{background:var(--kon-light);color:var(--kon);border-color:rgba(42,74,122,.25)}

/* ── 分頁導航 ── */
.tabs{
  display:flex;overflow-x:auto;
  padding:.5rem 1.5rem 0;
  gap:.15rem;
  scrollbar-width:none;
  border-bottom:1px solid var(--sumi5);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;
  padding:.55rem .7rem;
  font-size:11.5px;
  color:var(--sumi3);
  cursor:pointer;border:none;
  background:transparent;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  text-align:center;
  line-height:1.3;
  font-family:'Noto Sans TC',sans-serif;
  font-weight:300;
  transition:color .2s;
  margin-bottom:-1px;
}
.tab small{display:block;font-size:9.5px;margin-top:2px;font-weight:400;letter-spacing:.04em}
.tab.on{color:var(--sumi);font-weight:500;border-bottom-color:var(--aka)}
.tab:hover:not(.on){color:var(--sumi2)}

.tab small.osaka{color:var(--aka)}
.tab small.kyoto{color:var(--midori)}
.tab small.kobe{color:var(--kon)}
.tab small.rinku{color:var(--murasaki)}
.tab small.tr{color:var(--sumi4)}

/* ── 面板 ── */
.pane{display:none;padding:1.4rem 1.5rem}
.pane.on{display:block}

/* ── 日概覽卡片 ── */
.hero{
  margin-bottom:1.4rem;
  padding:1.1rem 1.2rem;
  background:#fff;
  border:1px solid var(--sumi5);
  border-left:3px solid var(--aka);
  border-radius:2px;
  position:relative;
}
.hero-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hero-dn{
  font-size:9.5px;color:var(--sumi4);
  letter-spacing:.14em;text-transform:uppercase;
  font-family:'Noto Sans TC',sans-serif;
  font-weight:400;
}
.hero h2{
  font-family:'Noto Serif TC',serif;
  font-size:15.5px;font-weight:600;
  color:var(--sumi);margin-top:.3rem;
  letter-spacing:.04em;line-height:1.35;
}
.hero-note{
  font-size:11.5px;color:var(--sumi2);
  margin-top:.7rem;line-height:1.75;
  font-weight:300;
}
.badge{
  font-size:10px;padding:2px 9px;
  border-radius:2px;border:1px solid;
  white-space:nowrap;flex-shrink:0;
  letter-spacing:.06em;font-weight:400;
  margin-top:2px;
}
.badge.osaka{background:var(--aka-light);color:var(--aka);border-color:rgba(181,55,42,.25)}
.badge.kyoto{background:var(--midori-light);color:var(--midori);border-color:rgba(45,107,74,.25)}
.badge.kobe{background:var(--kon-light);color:var(--kon);border-color:rgba(42,74,122,.25)}
.badge.rinku{background:var(--murasaki-light);color:var(--murasaki);border-color:rgba(90,58,122,.25)}
.badge.tr{background:var(--sumi6);color:var(--sumi3);border-color:var(--sumi5)}

/* ── 時間軸項目 ── */
.item{
  display:flex;
  cursor:pointer;
  border-radius:2px;
  transition:background .15s;
  margin-bottom:0;
  border-bottom:1px solid var(--sumi5);
}
.item:last-child{border-bottom:none}
.item:hover,.item.on{background:rgba(255,255,255,.7)}

.il{
  width:58px;flex-shrink:0;
  padding:12px 0 12px 2px;
  display:flex;flex-direction:column;align-items:center;
}
.it{
  font-size:9.5px;color:var(--sumi4);
  font-weight:400;white-space:nowrap;
  letter-spacing:.02em;
  font-family:'Noto Sans TC',sans-serif;
}
.dc{
  display:flex;flex-direction:column;
  align-items:center;flex:1;margin-top:5px;
}

/* 點：細線圓圈 */
.dot{
  width:7px;height:7px;border-radius:50%;
  border:1.5px solid var(--sumi4);
  background:var(--washi);
  flex-shrink:0;
  transition:border-color .2s;
}
.dot.s{border-color:var(--midori);background:var(--midori-light)}
.dot.f{border-color:var(--aka);background:var(--aka-light)}
.dot.m{border-color:var(--kon);background:var(--kon-light)}
.dot.h{border-color:var(--murasaki);background:var(--murasaki-light)}
.dot.sh{border-color:#a04060;background:#f8eaef}
.dot.ap{border-color:var(--sumi4);background:var(--sumi6)}

.ln{width:1px;flex:1;min-height:8px;background:var(--sumi5);margin-top:3px}

.im{flex:1;padding:10px 10px 10px 6px}
.im h3{
  font-size:13px;font-weight:500;
  color:var(--sumi);letter-spacing:.02em;
  line-height:1.4;
}
.im p{
  font-size:11px;color:var(--sumi3);
  margin-top:2px;line-height:1.55;
  font-weight:300;
}
.dur{
  font-size:9.5px;color:var(--sumi4);
  background:transparent;
  padding:0;
  display:inline-block;margin-top:4px;
  letter-spacing:.02em;
  border:none;
}

/* ── 展開詳情 ── */
.detail{
  display:none;
  padding:2px 10px 12px 6px;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.item.on .detail{display:block}

.desc{
  font-size:11.5px;color:var(--sumi2);
  line-height:1.8;margin-bottom:8px;
  font-weight:300;
  border-left:2px solid var(--sumi5);
  padding-left:10px;
}
.lb{
  font-size:9.5px;font-weight:500;
  letter-spacing:.1em;
  color:var(--sumi4);
  text-transform:uppercase;
  margin-bottom:3px;
  font-family:'Noto Sans TC',sans-serif;
}
.box{
  background:var(--sumi7);
  border:1px solid var(--sumi5);
  border-radius:2px;
  padding:7px 10px;
  font-size:11px;line-height:1.8;
  color:var(--sumi2);
  margin-bottom:7px;
}
.box div::before{
  content:'→ ';
  color:var(--sumi4);
  font-size:10px;
}
.tip{
  border-left:2px solid var(--aka);
  padding-left:9px;
  font-size:11px;color:var(--sumi2);
  line-height:1.7;
  margin-top:4px;
  background:var(--aka-light);
  padding:5px 9px;
  border-radius:0 2px 2px 0;
}

/* ── 圖例 ── */
.lgd{
  display:flex;flex-wrap:wrap;gap:5px 14px;
  font-size:10.5px;color:var(--sumi3);
  padding:10px 1.5rem 1.5rem;
  border-top:1px solid var(--sumi5);
  font-weight:300;
}
.li{display:flex;align-items:center;gap:5px}
.ld{width:7px;height:7px;border-radius:50%;border:1.5px solid;flex-shrink:0}

/* ── 收折箭頭 ── */
.arrow{
  float:right;
  font-size:9px;color:var(--sumi4);
  transition:transform .2s;
  margin-top:2px;
  user-select:none;
}
.item.on .arrow{transform:rotate(180deg)}
</style>
</head>

  <h1>大阪・神戶・京都<br>八日旅程</h1>

</div>

{t:"15:30",tp:"s",n:"美利堅公園 & Harborland 港灣",b:"海濱夕陽・摩天輪・神戶夜景",d:"Harborland 臨港休閒區，Mosaic 商場廣場可眺望神戶港和六甲山。傍晚夕陽配摩天輪是神戶最浪漫的景色。",tr:["地鐵海岸線「ハーバーランド站」出站即達"],tip:"港灣遊覽船 ¥1,500/60 分，傍晚出發最推薦。",dur:"1.5–2 小時"},
{t:"17:30",tp:"s",n:"生田神社",b:"緑意盎然，三宮中心",d:"生田神社是神戶最古老的神社，位於三宮熱鬧市區中，周圍是咖啡館和特色小店。",tr:["三宮步行約 5 分"],tip:"",dur:"30 分鐘"},
{t:"18:30",tp:"m",n:"返回大阪",b:"阪神電鐵，三宮→難波 約 40 分",d:"傍晚返回大阪，可在三宮車站買神戶限定伴手禮再出發。",tr:["阪神電鐵「三宮→難波」約 40 分，¥430","難波步行或換地鐵回飯店"],tip:"神戶伴手禮：亀井堂本家布丁・神戶風月堂法蘭酥・Flower Bakery 生吐司。",dur:"50 分鐘"},
{t:"—",tp:"ap",n:"附加方案：須磨海岸",b:"若時間充裕，可排在生田神社之後",d:"JR 神戶線三宮→須磨站約 12–15 分，車資 ¥190。南口出站步行 1 分鐘即抵沙灘，5 月氣候舒適適合散步。",tr:["JR 神戶線「三之宮→須磨」約 12–15 分，¥190"],tip:"附加方案，依體力與時間彈性安排。",dur:"1 小時"},
]},
{n:4,l:"第四天",c:"osaka",cl:"大阪",t:"勝尾寺 & 大阪在地",note:"早起木津市場（注意週日公休），上午出發勝尾寺達摩祈願，下午返城逛通天閣新世界，晚上在飯店旁吃最後一頓串炸。",
items:[
{t:"07:00",tp:"f",n:"木津市場早市",b:"大阪在地批發市場，海鮮丼早餐",d:"木津市場是大阪傳統批發市場，比黑門更在地，價格實惠。早上 6 點開始，可以吃到便宜又新鮮的海鮮丼。",tr:["Ocean Tsutenkaku 步行約 10 分","地鐵「大國町站」步行 5 分"],tip:"⚠️ 木津市場週日公休！5/11 若為週日請改其他早餐（鬆餅・松屋・MAZE CAFE SHINSEKAI）。",dur:"1–1.5 小時"},
{t:"09:00",tp:"m",n:"出發勝尾寺",b:"御堂筋線→箕面萱野站→阪急巴士 29 號",d:"從惠美須町/動物園前站搭御堂筋線（往北，往箕面萱野站方向）至終點站「箕面萱野站」下車，找阪急巴士 29 號站牌，於「勝尾寺站」下車。",tr:["御堂筋線至「箕面萱野站」（終點）約 45 分","阪急巴士 29 號→勝尾寺站 約 15 分"],tip:"⚠️ 重要：若趕不上巴士，從箕面萱野站搭計程車約 15 分（¥2,500–3,000），2–3 人搭更划算。",dur:"1.5 小時"},
{t:"11:00",tp:"s",n:"勝尾寺",b:"達摩祈願名所，境內費 ¥400",d:"勝尾寺是著名的達摩（だるま）祈願名所，境內擺滿無數小達摩非常壯觀，求勝運、求心願特別靈驗。綠意環繞，空氣清新。",tr:[],tip:"境內入場費 ¥400。勝尾寺的達摩是眼睛空白的，祈願時填入一隻眼，願望成真再填另一隻。",dur:"1.5 小時"},
{t:"13:30",tp:"m",n:"返回大阪",b:"原路搭巴士+御堂筋線，約 1.5 小時",d:"從勝尾寺站搭巴士返回箕面萱野，再搭御堂筋線回到惠美須町/難波一帶，約 15:00 回到飯店。",tr:["阪急巴士→箕面萱野站→御堂筋線至惠美須町"],tip:"",dur:"1.5 小時"},
{t:"15:30",tp:"s",n:"通天閣 & 新世界",b:"昭和情懷老街，最後好好逛一圈",d:"今天是最後一晚住 Ocean Tsutenkaku，好好逛一圈飯店門口的新世界！通天閣展望台、串炸老舖、復古遊戲中心。",tr:["Ocean Tsutenkaku 步行 2 分鐘"],tip:"通天閣展望台門票 ¥1,000。旁邊比利肯（幸運之神）雕像，摸腳可帶來好運，全家一起摸！",dur:"2 小時"},
{t:"20:00",tp:"f",n:"晚餐",b:"和牛吃到飽・壽喜燒・串燒・居酒屋",d:"候選：和和鍋壽喜燒吃到飽、板前燒肉、鴨肉串燒。",tr:[],tip:"甜點：Harbs 千層蛋糕、melt chocolate 巧克力奶昔（心齋橋）。",dur:"1.5 小時"},
]},
{n:5,l:"第五天",c:"kyoto",cl:"京都",t:"京都東山：南→北單向散步線",note:"當日來回京都，動線南→北一路順走完全不折返：伏見稻荷→清水寺→二年坂→八坂神社→花見小路→白川南通→鴨川→河原町晚餐。",
items:[
{t:"07:00",tp:"m",n:"出發前往伏見稻荷",b:"惠美須町搭堺筋線，轉乘往京都",d:"惠美須町站搭堺筋線 → 新今宮換 JR 大阪環狀線 → 大阪站轉 JR 京都線新快速 → 京都站（約 29 分）→ 轉 JR 奈良線 → 稻荷站（5 分）。",tr:["堺筋線「惠美須町→新今宮」換 JR 大阪環狀線","JR 京都線新快速「大阪→京都」約 29 分，¥570","JR 奈良線「京都→稻荷」約 5 分"],tip:"總時間約 1.5 小時，預計 08:30 抵達稻荷站。早出發可趁人潮湧入前進鳥居隧道。",dur:"1.5 小時"},
{t:"08:30",tp:"s",n:"伏見稻荷大社",b:"千本鳥居，早到避人潮",d:"全日本 3 萬座稻荷神社總本社，朱紅鳥居連綿舉世聞名。建議走到「奧社」即可回頭，來回約 2 小時，不必爬到山頂。24 小時免費開放。",tr:["JR 奈良線「稻荷站」出站步行 1 分"],tip:"8:30 前人潮最少，千本鳥居幾乎可以獨享。奧社有小茶屋可補充飲料點心。",dur:"2 小時"},
{t:"10:30",tp:"m",n:"伏見稻荷 → 清水寺",b:"京阪電車，約 20 分，¥220",d:"從伏見稻荷站搭京阪電車往清水五條方向，出站後沿茶碗坂步行上山，沿途有不少小店可以慢逛。",tr:["京阪本線「伏見稻荷→清水五條」約 20 分，¥220","清水五條站步行上山約 30 分至清水寺"],tip:"茶碗坂是清水寺下坡路段，陶器小店特別多。",dur:"50 分鐘"},
{t:"11:30",tp:"s",n:"清水寺 & 二年坂・三年坂",b:"本堂舞台・音羽瀑布・石板坡道",d:"清水寺「清水舞台」懸空於山腰，是世界遺產。必看：本堂舞台俯瞰京都市景、音羽瀑布（三道水柱各代表健康・戀愛・學業）。下山不走原路，直接沿二年坂往下逛。",tr:["清水五條站步行上坡約 30 分"],tip:"門票 ¥400。下山沿坡道往二年坂方向，更順路且更好逛。抹茶甜點必試。",dur:"1.5–2 小時"},
{t:"13:30",tp:"f",n:"午餐：二年坂 / 三年坂周邊",b:"豆腐料理・京風烏龍麵・抹茶甜點",d:"推薦：阿古屋茶屋茶泡飯吃到飽（¥1,680，CP 值高）、豆腐料理奧丹（湯豆腐套餐）、% Arabica 京都八坂店（咖啡打卡）。",tr:[],tip:"甜點推薦：よーじや 祇園店（抹茶聖代）、茶寮都路里（需排隊）。",dur:"1.5 小時"},
{t:"14:30",tp:"s",n:"八坂神社 & 圓山公園",b:"朱紅西樓門・求姻緣",d:"八坂神社朱紅色西樓門是京都最上相地標，24 小時免費參拜。圓山公園緊鄰旁邊，有長椅和草坪可休息。",tr:["從三年坂步行下坡約 10 分"],tip:"免費，旁邊圓山公園有長椅和草坪，可歇腳再繼續走。",dur:"40 分鐘"},
{t:"15:30",tp:"s",n:"花見小路 & 祇園",b:"最京都感的石板街",d:"花見小路保留完整木造町家建築，是京都花街文化象徵。注意：私人小巷禁止拍照，走花見小路大路即可，傍晚 16:00–17:00 有機會看到外出赴宴的藝伎或舞妓。",tr:["八坂神社步行 5 分"],tip:"禁止在町家門口大聲喧嘩或阻擋藝伎去路。建議順道試試祇園辻利的抹茶冰淇淋。",dur:"30 分鐘"},
{t:"16:00",tp:"s",n:"白川南通",b:"小橋流水，柳樹婚紗拍攝地",d:"白川南通是祇園最美的小徑，柳樹垂掛石板橋旁、流水潺潺，傍晚光線最迷人。",tr:["花見小路步行 5 分"],tip:"這條路很窄，人多時耐心等人潮散去再拍，傍晚光線最好。",dur:"30 分鐘"},
{t:"16:30",tp:"s",n:"鴨川四條大橋",b:"坐河邊看夕陽，著名的鴨川納涼",d:"從白川步行約 10 分鐘到四條大橋，坐在鴨川河岸石階上看夕陽，去旁邊超商買飲料放鬆。",tr:[],tip:"鴨川石階大家會等間距坐著，是著名的「鴨川納涼」文化。",dur:"30 分鐘"},
{t:"17:30",tp:"f",n:"晚餐：河原町 / 先斗町",b:"京都烏龍麵・京料理・親子丼",d:"推薦：権太呂本店（京都烏龍麵名店 ¥1,500 起）、先斗町 魯ビン（町家改裝，京料理套餐）、ひさご（親子丼名店 ¥1,100）。",tr:[],tip:"先斗町是條狹長小巷，兩側都是餐廳，氣氛很好。不排隊直接走進去看菜單再決定。",dur:"1.5 小時"},
{t:"19:00",tp:"m",n:"河原町 → 返回大阪",b:"阪急京都線→梅田→地鐵，約 1 小時",d:"從京都河原町站搭阪急京都線「特急」直達大阪梅田，再換地鐵返回 Ocean Tsutenkaku，約 20:30 回到飯店。",tr:["阪急京都線「河原町→梅田」約 45 分，¥430","地鐵「梅田→動物園前」約 10 分"],tip:"阪急比 JR 便宜，河原町站就在鴨川旁邊，非常方便。",dur:"1 小時"},
]},
{n:6,l:"第六天",c:"kyoto",cl:"京都",t:"嵐山 + 金閣寺",note:"當日來回京都，西→北半環線避免折返：嵐山渡月橋→天龍寺→竹林→野宮神社→嵐山午餐→嵐電→金閣寺→京都車站伴手禮，18:00 搭新快速返大阪。",
items:[
{t:"08:00",tp:"m",n:"出發前往嵐山",b:"堺筋線→阪急，約 1.5 小時",d:"惠美須町站搭堺筋線至天神橋筋六丁目，轉阪急京都線「特急」至桂站，再轉阪急嵐山線至嵐山站，預計 09:30 抵達。",tr:["堺筋線「惠美須町→天神橋筋六丁目」約 10 分","阪急京都線特急「天神橋筋六丁目→桂」約 40 分","阪急嵐山線「桂→嵐山」約 15 分，¥480 全程"],tip:"總時間約 1.5 小時。建議 8 點前到，人少光線最美。",dur:"1.5 小時"},
{t:"09:30",tp:"s",n:"渡月橋",b:"嵐山最具代表性地標，先拍照",d:"渡月橋橫跨桂川，是嵐山最具代表性的地標。早晨人少光線好，先在橋頭拍照留念，順路走至天龍寺方向。",tr:[],tip:"早上比下午人少很多，橋頭拍照不需要等太久。",dur:"30 分鐘"},
{t:"10:15",tp:"s",n:"天龍寺（世界遺產）",b:"曹源池庭園，以嵐山為借景，¥500",d:"天龍寺曹源池庭園以嵐山為借景，是日本最早獲選世界遺產的庭園。早上光線從東面照入，倒影最清晰。",tr:["渡月橋步行約 10 分至天龍寺"],tip:"庭園入場 ¥500。從天龍寺北門出來可直接接竹林小徑，動線最順。",dur:"1 小時"},
{t:"11:15",tp:"s",n:"竹林小徑 & 野宮神社",b:"天龍寺北門出來直接接",d:"竹林小徑高聳翠竹形成幽靜隧道。旁邊的野宮神社黑色鳥居全日本罕見，是《源氏物語》舞台，求良緣、求學業很靈驗。",tr:["天龍寺北門出來步行 1 分至竹林入口"],tip:"竹林早上比下午人少，光線從竹葉間篩落最美。野宮神社免費，境內龜石摸了可以實現願望。",dur:"45 分鐘"},
{t:"12:00",tp:"f",n:"嵐山午餐",b:"鰻魚飯・景觀蕎麥麵・% Arabica",d:"推薦：龜山家蕎麥麵（🈺11:30–14:30，週三休）、obu cafe（野宮神社步行 8 分）、中村屋、Onigiri Ranma 飯糰（JR 嵯峨嵐山站步行 4 分）。",tr:[],tip:"廣川鰻魚飯要排隊，建議 11:45 就去排。若不想等，嵐山よしむら景觀好且不用等太久。",dur:"1.5 小時"},
{t:"13:30",tp:"s",n:"嵐山商店街 & 足湯",b:"嵐電月台旁足湯，毛巾 ¥200",d:"嵐電月台旁足湯非常舒服，泡完腳繼續逛。沿商店街採買抹茶甜點、竹製工藝品。",tr:[],tip:"足湯毛巾 ¥200。月台本身也有懷舊氣氛，值得拍照。",dur:"1 小時"},
{t:"14:30",tp:"m",n:"嵐電 → 金閣寺",b:"嵐電 25 分 + 巴士 10 分，¥500",d:"從嵐電嵐山站搭嵐山本線至北野白梅町（¥250），轉市巴士 204/205 至金閣寺道（2 站約 10 分）。",tr:["嵐電嵐山本線「嵐山→北野白梅町」約 25 分，¥250","市巴士 204/205「北野白梅町→金閣寺道」約 10 分，¥230"],tip:"嵐電是有情調的古典小電車，一定要體驗。",dur:"35 分鐘"},
{t:"15:15",tp:"s",n:"金閣寺",b:"下午陽光反射最美，¥500",d:"金閣寺（鹿苑寺）金閣樓倒映在鏡湖池上，是日本最具代表性的景象之一。下午陽光從西面照射，金箔反光最耀眼。",tr:["金閣寺道步行 5 分至入口"],tip:"門票 ¥500。欣賞正面倒影後繞一圈花園即可，不必停太久。",dur:"1 小時"},
{t:"16:30",tp:"m",n:"205 巴士 → 京都車站",b:"約 40 分",d:"從金閣寺道搭市巴士 205 直達京都站，約 40 分鐘。",tr:["市巴士 205「金閣寺道→京都駅前」約 40 分，¥230"],tip:"若等車超過 10 分鐘，可先至烏丸站轉地鐵。",dur:"40 分鐘"},
{t:"17:15",tp:"sh",n:"京都車站 伊勢丹 / 拉麵小路",b:"伴手禮 + 晚餐",d:"伴手禮必買：阿闍梨餅（5–7 天保存期限）、生八橋（本家西尾八ッ橋）、辻利抹茶、中村藤吉茶葉。晚餐：拉麵小路（推薦ますたに背脂醬油拉麵）或伊勢丹 11F 和牛壽司。",tr:[],tip:"阿闍梨餅保存期限短，最後一天帶回台灣最新鮮。",dur:"1.5 小時"},
{t:"18:00",tp:"m",n:"京都站 → 返回大阪",b:"JR 新快速，約 30 分，¥570",d:"從 JR 京都站搭新快速返回大阪站，再換地鐵回 Ocean Tsutenkaku。",tr:["JR 京都線新快速「京都→大阪」約 30 分，¥570","地鐵「梅田→動物園前」約 10 分"],tip:"",dur:"40 分鐘"},
]},

{n:7,l:"第七天",c:"rinku",cl:"臨空城",t:"臨空城 Premium Outlets",note:"早上在大阪輕鬆用餐補買伴手禮，下午前往臨空城逛 Premium Outlets，晚上住機場旁，明天輕鬆出發。",

{t:"09:30",tp:"h",n:"Ocean Tsutenkaku 退房",b:"整理行李，確認護照機票",d:"大件行李可提前用「宅急便」寄送到關西機場（約 ¥1,500–2,000/件），自己輕裝搭電車。",tr:[],tip:"宅急便寄送到機場要提前一天預約，可請飯店前台協助。",dur:"1 小時"},

const tabs=document.getElementById('tabs');
const panes=document.getElementById('panes');

D.forEach((day,i)=>{
  const tab=document.createElement('button');
  tab.className='tab'+(i===0?' on':'');
  tab.innerHTML=`${day.l}<small class="${day.c}">${day.cl}</small>`;
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
    document.querySelectorAll('.pane').forEach((p,j)=>p.classList.toggle('on',j===i));
    tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  };
  tabs.appendChild(tab);

  const pane=document.createElement('div');
  pane.className='pane'+(i===0?' on':'');

  const its=day.items.map((it,j)=>`
    <div class="item" id="x${i}_${j}" onclick="tog(${i},${j})">
      <div class="il">
        <div class="it">${it.t}</div>
        <div class="dc">
          <div class="dot ${it.tp}"></div>
          ${j<day.items.length-1?'<div class="ln"></div>':''}
        </div>
      </div>
      <div class="im">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <h3>${it.n}<span class="arrow">▾</span></h3>
            ${it.b?`<p>${it.b}</p>`:''}
            ${it.dur&&it.dur!=='—'?`<span class="dur">◷ ${it.dur}</span>`:''}
          </div>
        </div>
        <div class="detail">
          ${it.d?`<p class="desc">${it.d}</p>`:''}
          ${it.tr&&it.tr.length?`
            <div style="margin-top:8px">
              <div class="lb">交通</div>
              <div class="box">${it.tr.map(r=>`<div>${r}</div>`).join('')}</div>
            </div>`:''}
          ${it.tip?`<div class="tip">💡 ${it.tip}</div>`:''}
        </div>
      </div>
    </div>`).join('');

  pane.innerHTML=`
    <div class="hero">
      <div class="hero-row">
        <div>
          <div class="hero-dn">Day ${day.n} of 8 &nbsp;·&nbsp; ${['抵達','大阪','神戶','京都','京都','大阪','臨空城','回程'][i]}</div>
          <h2>${day.t}</h2>
        </div>
        <span class="badge ${day.c}">${day.cl}</span>
      </div>
      <p class="hero-note">${day.note}</p>
    </div>
    <div style="background:#fff;border:1px solid var(--sumi5);border-radius:2px;overflow:hidden">
      ${its}
    </div>`;

  panes.appendChild(pane);
});

function tog(d,i){
  document.getElementById(`x${d}_${i}`).classList.toggle('on');
}
</script>
