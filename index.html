{t:"08:30",tp:"s",n:"嵐山竹林",b:"趁早人少，感受幽靜翠竹隧道",d:"嵐山竹林是京都最具代表性的視覺地標，高聳翠竹形成幽靜隧道。早晨人少、光線從竹葉間篩落，是全天最美的時段。竹林免費、24 小時開放。",tr:["JR「嵯峨嵐山站」步行 10 分至竹林入口"],tip:"",dur:"30–45 分鐘"},
{t:"09:15",tp:"s",n:"野宮神社",b:"竹林旁的戀愛神社，黑色鳥居全日本罕見",d:"野宮神社就在竹林步道旁，是《源氏物語》舞台，也是著名的求良緣、求學業神社。黑色鳥居在日本非常罕見，造型獨特。境內「龜石」摸了可以實現願望。",tr:["竹林步道中段步行 1 分鐘"],tip:"免費參拜。家人可以一起摸龜石許願，求緣分的繪馬很受歡迎。",dur:"20 分鐘"},
{t:"09:45",tp:"s",n:"天龍寺庭園",b:"世界遺產，以嵐山為借景的迴遊庭園",d:"天龍寺（世界遺產）曹源池庭園以嵐山和龜山為借景，是日本最早獲選世界遺產的庭園之一，四季皆美，非常適合帶家人慢慢欣賞。",tr:["野宮神社步行 3 分鐘"],tip:"庭園入場 ¥500。早上人少光線好，是拍庭園倒影的最佳時機。",dur:"45 分鐘"},
{t:"10:45",tp:"s",n:"渡月橋 & 嵐山公園河岸",b:"嵐山象徵橋，桂川風景如畫",d:"渡月橋橫跨桂川，四季皆美。橋旁嵐山公園寬廣舒適，很適合帶家人沿河岸漫步。可以在碼頭租小船，在河上欣賞嵐山山景。",tr:["天龍寺步行 8 分鐘"],tip:"小船租借約 ¥1,500–2,000/30 分鐘，可 2–4 人同乘，帶家人體驗感很好。",dur:"45 分鐘"},
{t:"11:45",tp:"f",n:"嵐山午餐",b:"湯豆腐定食・景觀蕎麥麵・抹茶甜點",d:"推薦：よしむら景觀蕎麥麵（邊看桂川邊吃），或找一家湯豆腐定食坐下來好好吃。午餐時段排隊人多，建議早一點去。",tr:[],tip:"嵐山午餐普遍偏貴，若預算有限便利商店+公園野餐也是好選擇。",dur:"1–1.5 小時"},
{t:"13:30",tp:"s",n:"嵐山商店街慢逛 & 足湯",b:"抹茶甜點・竹製工藝・免費足湯",d:"嵐山商店街有許多京都限定伴手禮和特色小店。嵐電嵐山站月台旁有付費足湯（¥200 租毛巾），泡完再繼續逛，走了一上午的腳超舒服。",tr:[],tip:"足湯是帶家人放鬆的好機會，老人家特別喜歡。泡完腳再走後半段行程，腳不會那麼累。",dur:"1 小時"},

const tabs=document.getElementById('tabs');
const panes=document.getElementById('panes');

D.forEach((day,i)=>{
  const tab=document.createElement('button');
  tab.className='tab'+(i===0?' on':'');
  tab.innerHTML=day.l+`<small class="${day.c}">${day.cl}</small>`;
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
    document.querySelectorAll('.pane').forEach((p,j)=>p.classList.toggle('on',j===i));
    tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  };
  tabs.appendChild(tab);

  const pane=document.createElement('div');
  pane.className='pane'+(i===0?' on':'');
  const its=day.items.map((it,j)=>`
    <div class="item" id="x${i}_${j}" onclick="tog(${i},${j})">
      <div class="il">
        <div class="it">${it.t}</div>
        <div class="dc">
          <div class="dot ${it.tp}"></div>
          ${j<day.items.length-1?'<div class="ln"></div>':''}
        </div>
      </div>
      <div class="im">
        <h3>${it.n}</h3>
        <p>${it.b}</p>
        ${it.dur&&it.dur!=='—'?`<span class="dur">⏱ ${it.dur}</span>`:''}
        <div class="detail">
          ${it.d?`<p class="desc" style="margin-top:8px">${it.d}</p>`:''}
          ${it.tr&&it.tr.length?`<div style="margin-top:6px"><div class="lb">交通方式</div><div class="box">${it.tr.map(r=>`<div>→ ${r}</div>`).join('')}</div></div>`:''}
          ${it.tip?`<div class="tip">💡 ${it.tip}</div>`:''}
        </div>
      </div>
    </div>`).join('');
  pane.innerHTML=`
    <div class="hero">
      <div class="hero-row">
        <div><div class="dn">Day ${day.n} / 8</div><h2>${day.t}</h2></div>
        <span class="badge ${day.c}">${day.cl}</span>
      </div>
      <p>${day.note}</p>
    </div>
    ${its}`;
  panes.appendChild(pane);
});

function tog(d,i){document.getElementById(`x${d}_${i}`).classList.toggle('on');}
</script>
